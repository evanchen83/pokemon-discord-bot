services:
  postgres:
    image: postgres:16-alpine
    container_name: pokemon-discord-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokemon_bot}
      POSTGRES_USER: ${POSTGRES_USER:-pokemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokemon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokemon} -d ${POSTGRES_DB:-pokemon_bot}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    image: liquibase/liquibase:4.29.1
    container_name: pokemon-discord-db-init
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=db.changelog-master.xml
      - --url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pokemon_bot}
      - --username=${POSTGRES_USER:-pokemon}
      - --password=${POSTGRES_PASSWORD:-pokemon}
      - update
    volumes:
      - ./db/changelog:/liquibase/changelog:ro
    restart: "no"

  discord-bot-shard-0:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokemon-discord-bot-shard-0
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      # Defaults can be overridden in .env
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_SYNC_COMMANDS: ${DISCORD_SYNC_COMMANDS:-true}
      WXO_AGENT_NAME: ${WXO_AGENT_NAME:-pokemon_tcg_agent}
      WXO_AGENT_ID: ${WXO_AGENT_ID:-}
      THREAD_TTL_MINUTES: ${THREAD_TTL_MINUTES:-10}
      # WXO credentials
      WXO_BASE_URL: ${WXO_BASE_URL:-}
      WXO_API_KEY: ${WXO_API_KEY:-}
      PACK_PG_DSN: ${PACK_PG_DSN:-postgresql://pokemon:pokemon@postgres:5432/pokemon_bot}
      THREAD_PG_DSN: ${THREAD_PG_DSN:-postgresql://pokemon:pokemon@postgres:5432/pokemon_bot}
      DISCORD_SHARD_COUNT: 2
      DISCORD_SHARD_IDS: 0
      DISCORD_SYNC_LEADER: "true"
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_PORT: 9108
    ports:
      - "9108:9108"

  discord-bot-shard-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokemon-discord-bot-shard-1
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      # Defaults can be overridden in .env
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_SYNC_COMMANDS: ${DISCORD_SYNC_COMMANDS:-true}
      WXO_AGENT_NAME: ${WXO_AGENT_NAME:-pokemon_tcg_agent}
      WXO_AGENT_ID: ${WXO_AGENT_ID:-}
      THREAD_TTL_MINUTES: ${THREAD_TTL_MINUTES:-10}
      # WXO credentials
      WXO_BASE_URL: ${WXO_BASE_URL:-}
      WXO_API_KEY: ${WXO_API_KEY:-}
      PACK_PG_DSN: ${PACK_PG_DSN:-postgresql://pokemon:pokemon@postgres:5432/pokemon_bot}
      THREAD_PG_DSN: ${THREAD_PG_DSN:-postgresql://pokemon:pokemon@postgres:5432/pokemon_bot}
      DISCORD_SHARD_COUNT: 2
      DISCORD_SHARD_IDS: 1
      DISCORD_SYNC_LEADER: "false"
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_PORT: 9108
    ports:
      - "9109:9108"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pokemon-discord-prometheus
    restart: unless-stopped
    depends_on:
      - discord-bot-shard-0
      - discord-bot-shard-1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: pokemon-discord-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
