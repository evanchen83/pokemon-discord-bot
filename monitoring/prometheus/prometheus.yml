global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: discord_bot_shard_0
    static_configs:
      - targets: ["discord-bot-shard-0:9108"]
        labels:
          shard: "0"

  - job_name: discord_bot_shard_1
    static_configs:
      - targets: ["discord-bot-shard-1:9108"]
        labels:
          shard: "1"
