<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-label="Pokemon Discord Bot architecture">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #1e293b; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .title { fill: #e2e8f0; font: 700 22px Arial, sans-serif; }
      .label { fill: #cbd5e1; font: 600 16px Arial, sans-serif; }
      .small { fill: #94a3b8; font: 500 13px Arial, sans-serif; }
      .accent { fill: #22d3ee; }
      .line { stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="40" y="44">Pokemon Discord Bot - Local Sharded Architecture</text>

  <rect class="panel" x="40" y="90" width="230" height="120"/>
  <text class="label" x="58" y="132">Discord API</text>
  <text class="small" x="58" y="158">Gateway + Slash Commands</text>

  <rect class="panel" x="340" y="70" width="270" height="155"/>
  <text class="label" x="360" y="108">discord-bot-shard-0</text>
  <text class="small" x="360" y="134">Discord commands + embeds</text>
  <text class="small" x="360" y="154">Metrics :9108</text>
  <circle class="accent" cx="575" cy="95" r="7"/>

  <rect class="panel" x="340" y="255" width="270" height="155"/>
  <text class="label" x="360" y="293">discord-bot-shard-1</text>
  <text class="small" x="360" y="319">Discord commands + embeds</text>
  <text class="small" x="360" y="339">Metrics :9109</text>
  <circle class="accent" cx="575" cy="280" r="7"/>

  <rect class="panel" x="700" y="70" width="190" height="120"/>
  <text class="label" x="720" y="112">Postgres</text>
  <text class="small" x="720" y="138">thread_state</text>
  <text class="small" x="720" y="156">pack/catch usage + history</text>

  <rect class="panel" x="700" y="220" width="190" height="120"/>
  <text class="label" x="720" y="262">Liquibase</text>
  <text class="small" x="720" y="288">db-init on startup</text>

  <rect class="panel" x="700" y="370" width="190" height="120"/>
  <text class="label" x="720" y="412">watsonx Orchestrate</text>
  <text class="small" x="720" y="438">/pokeagent runtime calls</text>

  <rect class="panel" x="940" y="120" width="140" height="110"/>
  <text class="label" x="962" y="162">Prometheus</text>
  <text class="small" x="962" y="186">:9090</text>

  <rect class="panel" x="940" y="300" width="140" height="110"/>
  <text class="label" x="974" y="342">Grafana</text>
  <text class="small" x="966" y="366">:3000 dashboards</text>

  <line class="line" x1="270" y1="140" x2="340" y2="130"/>
  <line class="line" x1="270" y1="160" x2="340" y2="300"/>

  <line class="line" x1="610" y1="120" x2="700" y2="120"/>
  <line class="line" x1="610" y1="300" x2="700" y2="130"/>
  <line class="line" x1="610" y1="310" x2="700" y2="430"/>

  <line class="line" x1="610" y1="150" x2="940" y2="170"/>
  <line class="line" x1="610" y1="330" x2="940" y2="170"/>
  <line class="line" x1="1080" y1="230" x2="1080" y2="300"/>

  <text class="small" x="40" y="574">Two shards share one Postgres state. Metrics are scraped per shard and visualized in Grafana.</text>
</svg>
