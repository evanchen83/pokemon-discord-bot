<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="780" viewBox="0 0 1360 780" role="img" aria-label="Pokemon Discord Bot architecture using IBM Carbon style">
  <defs>
    <style>
      .bg { fill: #161616; }
      .panel { fill: #262626; stroke: #525252; stroke-width: 1.5; rx: 10; ry: 10; }
      .panel-accent { fill: #202020; stroke: #0f62fe; stroke-width: 2; rx: 10; ry: 10; }
      .title { fill: #f4f4f4; font: 600 26px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.2px; }
      .subtitle { fill: #c6c6c6; font: 400 13px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }
      .h { fill: #f4f4f4; font: 600 18px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }
      .t { fill: #dde1e6; font: 400 14px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }
      .k { fill: #8d8d8d; font: 400 12px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }
      .tag { fill: #393939; stroke: #6f6f6f; stroke-width: 1; rx: 6; ry: 6; }
      .tagt { fill: #c6c6c6; font: 500 11px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; }
      .line { stroke: #78a9ff; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #a6c8ff; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
      .dot { fill: #0f62fe; }
      .dot2 { fill: #42be65; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#78a9ff" />
    </marker>
    <marker id="arrow2" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#a6c8ff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1360" height="780" />

  <text class="title" x="42" y="52">Pokemon Discord Bot Architecture</text>
  <text class="subtitle" x="42" y="76">Sharded Discord runtime + shared Postgres state + observability stack</text>

  <rect class="panel" x="42" y="120" width="255" height="132" />
  <text class="h" x="62" y="158">Discord API</text>
  <text class="t" x="62" y="184">Gateway + slash command traffic</text>
  <rect class="tag" x="62" y="204" width="126" height="24" />
  <text class="tagt" x="73" y="220">External service</text>

  <rect class="panel-accent" x="358" y="106" width="330" height="184" />
  <text class="h" x="380" y="145">discord-bot-shard-0</text>
  <text class="t" x="380" y="173">Commands: /open_pack, /catch, /pokebox, /pokeagent</text>
  <text class="t" x="380" y="197">Metrics endpoint: :9108</text>
  <text class="k" x="380" y="224">DISCORD_SHARD_IDS=0, DISCORD_SYNC_LEADER=true</text>
  <circle class="dot2" cx="662" cy="128" r="6" />

  <rect class="panel-accent" x="358" y="322" width="330" height="184" />
  <text class="h" x="380" y="361">discord-bot-shard-1</text>
  <text class="t" x="380" y="389">Commands: /open_pack, /catch, /pokebox, /pokeagent</text>
  <text class="t" x="380" y="413">Metrics endpoint: :9109 (mapped to :9108 in container)</text>
  <text class="k" x="380" y="440">DISCORD_SHARD_IDS=1, DISCORD_SYNC_LEADER=false</text>
  <circle class="dot2" cx="662" cy="344" r="6" />

  <rect class="panel" x="750" y="106" width="280" height="184" />
  <text class="h" x="772" y="145">Postgres</text>
  <text class="t" x="772" y="173">Shared state across shards:</text>
  <text class="t" x="772" y="197">- thread_state</text>
  <text class="t" x="772" y="221">- pack_openings, pack_cards</text>
  <text class="t" x="772" y="245">- open_pack_command_usage</text>
  <text class="t" x="772" y="269">- pokemon_catches, catch_command_usage</text>

  <rect class="panel" x="750" y="322" width="280" height="114" />
  <text class="h" x="772" y="360">Liquibase db-init</text>
  <text class="t" x="772" y="386">Applies changelogs on startup</text>
  <text class="k" x="772" y="410">db/changelog/db.changelog-master.xml</text>

  <rect class="panel" x="750" y="468" width="280" height="114" />
  <text class="h" x="772" y="506">watsonx Orchestrate</text>
  <text class="t" x="772" y="532">Runtime agent calls for /pokeagent</text>
  <text class="k" x="772" y="556">Dynamic availability checks before command run</text>

  <rect class="panel" x="1082" y="166" width="236" height="134" />
  <text class="h" x="1104" y="204">Prometheus</text>
  <text class="t" x="1104" y="230">Scrapes both shard metrics</text>
  <text class="t" x="1104" y="254">Port: :9090</text>

  <rect class="panel" x="1082" y="356" width="236" height="134" />
  <text class="h" x="1104" y="394">Grafana</text>
  <text class="t" x="1104" y="420">Dashboards for command usage</text>
  <text class="t" x="1104" y="444">Port: :3000</text>

  <path class="line" d="M297 166 L358 166" />
  <path class="line" d="M297 204 L358 384" />

  <path class="line" d="M688 166 L750 166" />
  <path class="line" d="M688 384 L750 204" />

  <path class="line2" d="M688 420 L750 522" />

  <path class="line" d="M688 220 L1082 220" />
  <path class="line" d="M688 430 L1082 250" />
  <path class="line2" d="M1318 300 L1318 356" />

  <circle class="dot" cx="523" cy="166" r="4" />
  <circle class="dot" cx="523" cy="384" r="4" />
  <circle class="dot" cx="890" cy="220" r="4" />
  <circle class="dot" cx="1200" cy="220" r="4" />

  <text class="k" x="42" y="734">Carbon-inspired palette: Gray 100 background, Gray 90 surfaces, Blue 60 accents, IBM Plex Sans typography.</text>
</svg>
